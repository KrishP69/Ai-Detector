<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Image Detector</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
<h2>AI Detector</h2>
<button id="themeToggle">🌙</button>
</nav>

<div class="hero">
<h1>Detect AI Generated Images</h1>
<p>Upload an image and let our AI analyze it instantly.</p>
</div>

<div class="container">

<div class="card">

<div id="dropArea">
<p>Drag & Drop Image</p>
<input type="file" id="imageUpload" accept="image/*">
</div>

<img id="preview">

<div class="buttons">
<button onclick="detectAI()">Detect AI</button>
<button class="secondary" onclick="removeImage()">Remove</button>
</div>

<div id="loading">
<div class="spinner"></div>
<p>Analyzing image...</p>
</div>

<div id="result"></div>

<div id="confidenceBar">
<div id="confidenceFill"></div>
</div>

</div>

</div>

<section class="history">

<h2>Scan History</h2>

<div id="historyList"></div>

</section>

<footer>
<p>Built by Krish Patil • AI Detector</p>
</footer>

<script src="script.js"></script>

</body>
</html>
